# Default values for sd-syndicated-loan (BIAN Service Domain: Syndicated Loan)

image:
  repository: bian/sd-syndicated-loan
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# Namespace is set per BIAN business area by deploy-all.sh (helm -n <ns>).
# These labels ride on every object for mesh policy + observability slicing.
bian:
  serviceDomain: "syndicated-loan"
  businessArea: "operations-and-execution"
  businessDomain: "loans-and-deposits"
  functionalPattern: "fulfill"

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Gateway API route (Cilium implements Gateway API natively — no ingress controller)
route:
  enabled: true
  gatewayName: bian-gateway
  gatewayNamespace: bian-system
  # External path prefix; rewritten to / before hitting the service
  pathPrefix: /sd-syndicated-loan

# CiliumNetworkPolicy — default-deny posture, explicit allows
networkPolicy:
  enabled: true
  monitoringNamespace: monitoring
